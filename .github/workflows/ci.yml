name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: creatorrag
          POSTGRES_PASSWORD: creatorrag
          POSTGRES_DB: creatorrag
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U creatorrag"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports: ["6333:6333"]
    env:
      DATABASE_URL: postgresql://creatorrag:creatorrag@localhost:5432/creatorrag
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
      CREATORRAG_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            (echo > /dev/tcp/localhost/6333) >/dev/null 2>&1 && break
            sleep 1
          done
      - name: Ruff (lint)
        working-directory: backend
        run: ruff check app tests
      - name: Mypy (type check, non-blocking)
        working-directory: backend
        run: mypy app || true
      - name: Pytest (unit + integration)
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
